<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Aplikasi Stok Gudang{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-blue-600 text-white shadow-lg">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between py-3">
                <a href="{{ url_for('home') }}" class="text-xl font-bold">📦 Stok Gudang</a>
                <div class="flex space-x-4">
                    <a href="{{ url_for('jenis.index') }}" class="hover:bg-blue-700 px-3 py-2 rounded">Jenis</a>
                    <a href="{{ url_for('satuan.index') }}" class="hover:bg-blue-700 px-3 py-2 rounded">Satuan</a>
                    <a href="{{ url_for('merek.index') }}" class="hover:bg-blue-700 px-3 py-2 rounded">Merek</a>
                    <a href="{{ url_for('barang.index') }}" class="hover:bg-blue-700 px-3 py-2 rounded">Barang</a>
                    <a href="{{ url_for('stok.index') }}" class="hover:bg-blue-700 px-3 py-2 rounded">Stok</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-6">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-4 p-4 rounded-lg {% if category == 'success' %}bg-green-100 text-green-800 border border-green-300{% else %}bg-red-100 text-red-800 border border-red-300{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
